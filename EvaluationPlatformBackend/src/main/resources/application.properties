server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/governance_db
spring.datasource.username=postgres
spring.datasource.password=samchi
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
jwt.secret=YourVeryLongSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration=86400000
cors.allowed.origins=http://localhost:3000
logging.level.com.governance.evaluation=INFO
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate=ERROR
spring.sql.init.mode=never

# Set true once on empty DB to load governance/seed.json (Principles → Practices → Criteria)
governance.seed.enabled=true